name: Java CI Professional Pipeline Optimized

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # tive q unificar Build, Teste e Segurança pq levava uma ETERNIDADE pra baixar as dependências, assim aproveita o achce
  build-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and Unit Tests
        run: mvn clean install -DskipTests=false # install ajuda a deixar os arquivos prontos para os próximos comandos

      - name: SonarCloud Scan
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn sonar:sonar

#      - name: Dependency Check (OWASP)
        # roda apenas no push para a main para economizar tempo - tive q remover pq a conexão era negada
#        if: github.ref == 'refs/heads/main'
#        run: mvn org.owasp:dependency-check-maven:check

  containerize:
    needs: build-and-verify
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.actor }}/uniesptech:latest
          # isso aqui garante o uso do cache e acelera MUITO cada deploy:
          cache-from: type=gha
          cache-to: type=gha,mode=max